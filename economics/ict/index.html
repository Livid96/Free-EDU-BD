<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free-Edu | ICT Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010816;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3a86ff;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --danger: #ff4d4d;
            --success: #00ff88;
            --danger-bg: linear-gradient(135deg, #b91c1c, #dc2626);
            --danger-glow: rgba(220, 38, 38, 0.5);
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }

        .ambient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(58, 134, 255, 0.1), transparent 40%);
            z-index: -2;
        }

        /* --- NAVIGATION (AS PROVIDED) --- */
        nav {
            position: sticky; top: 15px; z-index: 1000;
            max-width: 1200px; margin: 10px auto; padding: 15px 25px;
            background: rgba(10, 15, 30, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
        }
        .logo-link { text-decoration: none; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 0.85rem; letter-spacing: 3px; color: var(--accent); }
        .search-container { flex: 1; max-width: 450px; margin: 0 15px; }
        .search-bar {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 10px 20px; color: white; outline: none; transition: 0.3s;
        }
        .nav-btn {
            background: var(--glass); border: 1px solid var(--glass-border); color: white;
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px; margin-left: 5px;
        }

        /* --- CHAPTER & PART LIST --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .chapter-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; margin-bottom: 15px; overflow: hidden;
        }
        .chapter-header {
            padding: 20px; cursor: pointer; display: flex; justify-content: space-between;
            font-weight: 600; transition: 0.3s;
        }
        .chapter-header:hover { background: rgba(255,255,255,0.05); }

        .parts-list { display: none; padding: 10px 20px; background: rgba(0,0,0,0.2); }
        .part-item {
            padding: 12px; margin: 5px 0; border-radius: 12px; cursor: pointer;
            border: 1px solid transparent; transition: 0.3s; color: var(--text-dim);
        }
        .part-item:hover { background: var(--glass); border-color: var(--accent); color: white; }

        /* --- VIDEO PLAYER SECTION --- */
        .video-section { display: none; margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; }
        #yt-player { width: 100%; height: 100%; border: none; }

        .player-controls {
            display: flex; gap: 10px; padding: 15px; background: rgba(10, 17, 26, 0.9);
            border-radius: 0 0 15px 15px; border: 1px solid var(--glass-border); flex-wrap: wrap;
            justify-content: center;
        }
        .channel-info { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .channel-badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .channel-name { font-weight: 600; color: var(--text-main); font-size: 0.9rem; }

        .active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <nav id="navbar">
        <a href="/index.html" class="logo-link"><div class="logo">FREE-EDU</div></a>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search topics...">
        </div>
        <div class="nav-actions">
            <button class="nav-btn">License</button>
            <button class="nav-btn">About</button>
        </div>
    </nav>

    <div class="container">
        <div class="chapter-card">
            <div class="chapter-header" onclick="toggleElement('parts-ch1')">
                অধ্যায়-১: তথ্য ও যোগাযোগ প্রযুক্তি (আইসিটি) ও কম্পিউটার সিস্টেমের পরিচিতি
                <span>▼</span>
            </div>
            <div id="parts-ch1" class="parts-list">
                <div class="part-item" onclick="loadVideo('tqJOtuOV3hw', 'Part 1: Introduction to ICT')">Part 1: ICT Definition & Concept</div>
                <div class="part-item" onclick="alert('Part 2 coming soon!')">Part 2: Computer Systems</div>
            </div>
        </div>

        <div id="videoSection" class="video-section">
            <h3 id="videoTitle" style="margin-bottom: 15px; color: var(--accent);"></h3>
            <div class="video-wrapper">
                <div id="yt-player"></div>
            </div>
            
            <div class="player-controls">
                <button class="nav-btn" onclick="seek(-10)">-10s</button>
                <button class="nav-btn" onclick="player.playVideo()">Play</button>
                <button class="nav-btn" onclick="player.pauseVideo()">Pause</button>
                <button class="nav-btn" onclick="seek(10)">+10s</button>
                <select class="nav-btn" onchange="player.setPlaybackRate(parseFloat(this.value))">
                    <option value="1">1x Speed</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>

            <div class="channel-info">
                <span class="channel-badge">CHANNEL</span>
                <span id="channelNameDisplay" class="channel-name">Loading...</span>
            </div>
        </div>

        <div class="chapter-card"><div class="chapter-header">অধ্যায়-২: কম্পিউটার হার্ডওয়্যার অ্যান্ড সফটওয়‍্যার <span>▼</span></div></div>
        <div class="chapter-card"><div class="chapter-header">অধ্যায়-৩: ওয়ার্ড প্রসেসিং অ্যাপ্লিকেশনের পরিচিতি <span>▼</span></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let currentVideoId = '';

        function onYouTubeIframeAPIReady() {
            // Initial player instance (hidden until a part is clicked)
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                playerVars: { 'autoplay': 0, 'controls': 1, 'modestbranding': 1 },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Player is ready
        }

        function toggleElement(id) {
            const el = document.getElementById(id);
            el.classList.toggle('active');
        }

        function loadVideo(videoId, title) {
            currentVideoId = videoId;
            document.getElementById('videoSection').classList.add('active');
            document.getElementById('videoTitle').innerText = title;
            
            player.loadVideoById(videoId);
            
            // Auto-fetch channel name using the OEmbed/Data API approach for the UI
            fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('channelNameDisplay').innerText = data.author_name;
                });
            
            // Scroll to video
            window.scrollTo({ top: document.getElementById('videoSection').offsetTop - 100, behavior: 'smooth' });
        }

        function seek(seconds) {
            player.seekTo(player.getCurrentTime() + seconds, true);
        }
    </script>
</body>
</html>
